<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>管理后台 · 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .login-card {
      background: rgba(255,255,255,0.96); border-radius: 32px;
      padding: 2.5rem 2rem 2.5rem 2rem; width: 100%; max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .login-card h2 { font-size: 1.7rem; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 0.2rem; }
    .login-card .sub { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
    .admin-badge {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-bottom: 1.5rem; color: #0f3460; font-size: 0.8rem; font-weight: 600;
    }
    .admin-badge::before, .admin-badge::after {
      content: ''; flex: 1; height: 1px; background: #e2e8f0;
    }
    .input-group { margin-bottom: 1.3rem; }
    .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #1e293b; margin-bottom: 0.4rem; }
    .input-group input {
      width: 100%; padding: 0.85rem 1rem; font-size: 1rem; background: #f8fafc;
      border: 1px solid #e2e8f0; border-radius: 16px; transition: 0.2s; outline: none;
    }
    .input-group input:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.15); background: white; }
    .login-btn {
      width: 100%; background: linear-gradient(135deg, #0f3460, #1a1a2e); color: white; border: none;
      padding: 0.85rem; font-size: 1rem; font-weight: 600; border-radius: 40px;
      cursor: pointer; transition: 0.2s; margin-top: 0.5rem;
    }
    .login-btn:hover { transform: scale(0.98); box-shadow: 0 4px 12px rgba(15,52,96,0.3); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .back-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
    .back-link a { color: #64748b; text-decoration: none; }
    .back-link a:hover { color: #0f3460; }
    .error-msg {
      background: #fef2f2; color: #dc2626; padding: 0.7rem 1rem; border-radius: 12px;
      font-size: 0.85rem; margin-bottom: 1.2rem; text-align: center; display: none;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
<div class="login-card">
  <h2>🔐 管理后台</h2>
  <div class="sub">小灵唠微信AI · 管理员登录</div>
  <div class="admin-badge">管理员专享</div>
  <div id="errorMsg" class="error-msg"></div>
  <form id="loginForm">
    <div class="input-group">
      <label for="username">管理员账号</label>
      <input type="text" id="username" placeholder="输入管理员用户名" required autocomplete="username">
    </div>
    <div class="input-group">
      <label for="password">密码</label>
      <input type="password" id="password" placeholder="输入管理员密码" required autocomplete="current-password">
    </div>
    <button type="submit" class="login-btn" id="submitBtn">登录后台</button>
  </form>
  <div class="back-link"><a href="/login">← 返回用户登录</a></div>
</div>
<script>
  const API_BASE_URL = 'https://delicate-firefly-23d6.2824387178.workers.dev';
  const api = {
    post: async (endpoint, data) => {
      const resp = await fetch(API_BASE_URL + endpoint, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
      });
      return await resp.json();
    }
  };
  if (localStorage.getItem('adminToken')) window.location.href = '/admin/dashboard';
  const form = document.getElementById('loginForm');
  const errorDiv = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
      errorDiv.textContent = '请输入用户名和密码';
      errorDiv.style.display = 'block';
      return;
    }
    errorDiv.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = '登录中...';
    try {
      const data = await api.post('/api/admin/login', { username, password });
      if (data.code === 0 && data.data && data.data.token) {
        localStorage.setItem('adminToken', data.data.token);
        localStorage.setItem('admin', JSON.stringify(data.data.admin));
        window.location.href = '/admin/dashboard';
      } else {
        errorDiv.textContent = data.message || '登录失败';
        errorDiv.style.display = 'block';
      }
    } catch (err) {
      errorDiv.textContent = '网络错误，请稍后重试';
      errorDiv.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '登录后台';
    }
  });
</script>
</body>
</html>
