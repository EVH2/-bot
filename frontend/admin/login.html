<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>登录 - 小灵唠微信AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: url('https://cdn.phototourl.com/free/2026-05-25-1338b2c9-de7f-411f-bbbd-b0bd84954c58.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 2rem 1.8rem 2.2rem 1.8rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.25);
    }

    .login-card h2 {
      font-size: 1.9rem;
      font-weight: 600;
      color: #1f2b48;
      text-align: center;
      margin-bottom: 0.4rem;
      letter-spacing: -0.3px;
    }

    .login-card .sub {
      text-align: center;
      color: #4a5b7a;
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid #eef2f6;
      display: inline-block;
      width: auto;
      padding-bottom: 0.3rem;
    }

    .input-group {
      margin-bottom: 1.3rem;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1f2b48;
      margin-bottom: 0.4rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      background: #fff;
      border: 1px solid #d9e0eb;
      border-radius: 20px;
      transition: 0.2s;
      outline: none;
    }

    .input-group input:focus {
      border-color: #5e6f9d;
      box-shadow: 0 0 0 3px rgba(94, 111, 157, 0.2);
    }

    .login-btn {
      width: 100%;
      background: #1f2b48;
      color: white;
      border: none;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.8rem;
    }

    .login-btn:hover {
      background: #2e3b5e;
      transform: scale(0.98);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #4a5b7a;
    }

    .register-link a {
      color: #1f2b48;
      font-weight: 600;
      text-decoration: none;
    }

    .error-msg {
      background: #fff0f0;
      color: #c23d3d;
      padding: 0.7rem 1rem;
      border-radius: 60px;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
      text-align: center;
      display: none;
      border-left: 3px solid #c23d3d;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 1.8rem 1.3rem;
      }
      .login-card h2 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>

<div class="login-card">
  <h2>小灵唠微信AI</h2>
  <div class="sub">欢迎回来</div>
  <div id="errorMsg" class="error-msg"></div>
  <form id="loginForm">
    <div class="input-group">
      <label for="username">用户名</label>
      <input type="text" id="username" placeholder="输入用户名" required>
    </div>
    <div class="input-group">
      <label for="password">密码</label>
      <input type="password" id="password" placeholder="输入密码" required>
    </div>
    <button type="submit" class="login-btn" id="submitBtn">登录</button>
  </form>
  <div class="register-link">
    还没有账号？ <a href="/register">立即注册</a>
  </div>
</div>

<script>
  // 请将下面的地址替换为你的 Worker 真实地址
  const API_BASE_URL = 'https://delicate-firefly-23d6.2824387178.workers.dev';

  window.api = {
    post: async (endpoint, data) => {
      const url = API_BASE_URL + endpoint;
      const token = localStorage.getItem('token');
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify(data || {}) });
      return await resp.json();
    }
  };

  if (localStorage.getItem('token')) {
    window.location.href = '/dashboard';
  }

  const form = document.getElementById('loginForm');
  const errorDiv = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
      errorDiv.textContent = '用户名和密码不能为空';
      errorDiv.style.display = 'block';
      return;
    }
    errorDiv.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = '登录中...';
    try {
      const data = await window.api.post('/api/auth/login', { username, password });
      if (data.code === 0 && data.data && data.data.token) {
        localStorage.setItem('token', data.data.token);
        if (data.data.user) localStorage.setItem('user', JSON.stringify(data.data.user));
        window.location.href = '/dashboard';
      } else {
        errorDiv.textContent = data.message || '登录失败';
        errorDiv.style.display = 'block';
      }
    } catch (err) {
      errorDiv.textContent = err.message || '网络错误';
      errorDiv.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '登录';
    }
  });
</script>
</body>
</html>
