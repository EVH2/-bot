<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - ClawBot AI</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .auth-card {
      background: white;
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-header h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 0.5rem;
    }
    
    .auth-header p {
      color: #666;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #555;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .invite-tip {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #667eea;
      font-size: 0.9rem;
    }
    
    .btn-auth {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }
    
    .btn-auth:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: #666;
    }
    
    .auth-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    
    .auth-footer a:hover {
      text-decoration: underline;
    }
    
    .error-msg {
      background: #fee;
      color: #c33;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    
    .success-msg {
      background: #efe;
      color: #3c3;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🎭 欢迎加入</h1>
        <p>创建你的 ClawBot 账号</p>
      </div>
      
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>
      
      <form id="registerForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" placeholder="请输入用户名（2-20字符）" required minlength="2" maxlength="20">
        </div>
        
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" placeholder="请输入密码（至少6位）" required minlength="6">
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">确认密码</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
        </div>
        
        <div id="inviteTip" class="invite-tip" style="display: none;">
          🎁 使用邀请链接注册，获得额外奖励！
        </div>
        
        <button type="submit" class="btn-auth" id="submitBtn">注册</button>
      </form>
      
      <div class="auth-footer">
        已有账号？<a href="/login">立即登录</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // 检查是否有邀请链接参数
    const urlParams = new URLSearchParams(window.location.search);
    const inviteLink = urlParams.get('invite_link');
    
    if (inviteLink) {
      document.getElementById('inviteTip').style.display = 'block';
      // 存储邀请链接到表单
      document.getElementById('registerForm').dataset.inviteLink = inviteLink;
    }
    
    // 注册表单提交
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');
      
      // 隐藏之前的消息
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      // 验证密码
      if (password !== confirmPassword) {
        errorMsg.textContent = '两次输入的密码不一致';
        errorMsg.style.display = 'block';
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = '注册中...';
      
      try {
        const data = await api.post('/api/auth/register', {
          username,
          password,
          invite_link: inviteLink || undefined
        });
        
        if (data.code === 0) {
          successMsg.innerHTML = `注册成功！您的邀请码是：<strong>${data.data.invite_code}</strong><br>请等待管理员审核后登录。`;
          successMsg.style.display = 'block';
          
          // 跳转到登录页
          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
        } else {
          errorMsg.textContent = data.message;
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = '注册失败：' + err.message;
        errorMsg.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '注册';
      }
    });
  </script>
</body>
</html>
