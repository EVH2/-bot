# ClawBot AI - Wrangler 配置
name = "delicate-firefly-23d6"
main = "worker.js"
compatibility_date = "2024-11-22"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "clawbot-db"
database_id = "494274c8-e467-42e2-9df2-a8339502df66"

# 环境变量
[vars]
JWT_SECRET = "clawbot_jwt_secret_2026_evah2_secure"
PLATFORM_NAME = "ClawBot AI"
DEFAULT_REWARD_MESSAGES = "50"
WECHAT_API_URL = "https://your-clawbot-api/send"

# 定时触发器
[triggers]
crons = [
  "0 8 * * *",
  "0 12 * * *",
  "0 22 * * *",
  "0 * * * *"
]
